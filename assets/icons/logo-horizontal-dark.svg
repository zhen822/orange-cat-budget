<path d="M26.5 37.5 L28 39.2 L29.5 37.5 Q28 37 26.5 37.5Z" fill="#F9A8C9"/>
<!-- Mouth -->
<path d="M25 40.5 Q28 42.6 31 40.5" fill="none" stroke="#D97706" stroke-width="1.1" stroke-linecap="round"/>
<!-- Collar -->
<rect x="13" y="48.5" width="30" height="4.5" rx="2.2" fill="#5A3D2B"/>
<rect x="14" y="49.5" width="28" height="2.5" rx="1.5" fill="#6B4C34"/>
<!-- Coin tag -->
<circle cx="28" cy="54" r="5" fill="#059669"/>
<text x="28" y="57" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="5" font-weight="800" fill="#ECFDF5">¥</text>
<!-- Whiskers left -->
<line x1="4" y1="35" x2="17.5" y2="36.5" stroke="#FDE68A" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
<line x1="3.5" y1="38.5" x2="17.2" y2="38.5" stroke="#FDE68A" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
<!-- Whiskers right -->
<line x1="52" y1="35" x2="38.5" y2="36.5" stroke="#FDE68A" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
<line x1="52.5" y1="38.5" x2="38.8" y2="38.5" stroke="#FDE68A" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>

<!-- Brand text — light on dark -->
<text x="68" y="22" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#F9FAFB" letter-spacing="-0.4">OrangeCat Budget</text>
<text x="69" y="38" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="12" font-weight="500" fill="#FBBF24" letter-spacing="1.8">橘猫记账</text>
<text x="69" y="50" font-family="-apple-system,sans-serif" font-size="9.5" fill="#6B7280" letter-spacing="0.3">Personal budgeting, made cozy</text>
</svg>
