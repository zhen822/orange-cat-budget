<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 56" width="260" height="56" role="img">
<title>OrangeCat Budget horizontal logo — dark</title>
<defs>
  <radialGradient id="hG3" cx="50%" cy="42%" r="52%">
    <stop offset="0%" stop-color="#FBBF24"/>
    <stop offset="100%" stop-color="#F59E0B"/>
  </radialGradient>
</defs>
<!-- Icon bg — warm dark -->
<rect x="0" y="0" width="56" height="56" rx="13" fill="#2A1A00" fill-opacity="0.55"/>
<rect x="1" y="1" width="54" height="54" rx="12" fill="none" stroke="#92400E" stroke-width="1" opacity="0.5"/>
<!-- Left ear -->
<ellipse cx="15" cy="16" rx="6.8" ry="7.8" fill="#F59E0B"/>
<path d="M9.5 11 Q15 5 20.5 11" fill="#D97706"/>
<ellipse cx="15" cy="17.5" rx="4.2" ry="5" fill="#FBBF24"/>
<ellipse cx="15" cy="18.5" rx="2.6" ry="3.1" fill="#FFB7C5" opacity="0.88"/>
<!-- Right ear -->
<ellipse cx="41" cy="16" rx="6.8" ry="7.8" fill="#F59E0B"/>
<path d="M35.5 11 Q41 5 46.5 11" fill="#D97706"/>
<ellipse cx="41" cy="17.5" rx="4.2" ry="5" fill="#FBBF24"/>
<ellipse cx="41" cy="18.5" rx="2.6" ry="3.1" fill="#FFB7C5" opacity="0.88"/>
<!-- Head -->
<ellipse cx="28" cy="32" rx="22" ry="21.5" fill="url(#hG3)"/>
<!-- Forehead stripes -->
<path d="M28 14 Q28.3 17 28 21" fill="none" stroke="#D97706" stroke-width="1.4" stroke-linecap="round" opacity="0.48"/>
<path d="M23.2 15.2 Q23.5 18 23.4 21.2" fill="none" stroke="#D97706" stroke-width="1.1" stroke-linecap="round" opacity="0.4"/>
<path d="M32.8 15.2 Q32.5 18 32.6 21.2" fill="none" stroke="#D97706" stroke-width="1.1" stroke-linecap="round" opacity="0.4"/>
<!-- Blush -->
<ellipse cx="11.5" cy="35.5" rx="5.8" ry="3.8" fill="#FFB7C5" opacity="0.52"/>
<ellipse cx="44.5" cy="35.5" rx="5.8" ry="3.8" fill="#FFB7C5" opacity="0.52"/>
<!-- Muzzle -->
<ellipse cx="28" cy="38.5" rx="11.2" ry="8.5" fill="#FFF4D6"/>
<!-- Left eye -->
<ellipse cx="20.5" cy="30" rx="6.2" ry="5.9" fill="white"/>
<ellipse cx="20.5" cy="30.5" rx="4.6" ry="4.8" fill="#4A3518"/>
<ellipse cx="20.5" cy="30.8" rx="2.3" ry="3.2" fill="#1A0F00"/>
<ellipse cx="18.8" cy="28.3" rx="1.6" ry="1.3" fill="white" opacity="0.92"/>
<path d="M14.8 28.2 Q20.5 25.4 26.2 28.2" fill="none" stroke="#5A3D2B" stroke-width="1.3" stroke-linecap="round"/>
<!-- Right eye -->
<ellipse cx="35.5" cy="30" rx="6.2" ry="5.9" fill="white"/>
<ellipse cx="35.5" cy="30.5" rx="4.6" ry="4.8" fill="#4A3518"/>
<ellipse cx="35.5" cy="30.8" rx="2.3" ry="3.2" fill="#1A0F00"/>
<ellipse cx="33.8" cy="28.3" rx="1.6" ry="1.3" fill="white" opacity="0.92"/>
<path d="M29.8 28.2 Q35.5 25.4 41.2 28.2" fill="none" stroke="#5A3D2B" stroke-width="1.3" stroke-linecap="round"/>
