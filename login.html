<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>橘猫记账 · OrangeCat Budget — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/darkmode.css">
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--grad-hero);
      padding: var(--space-lg);
    }

    .login-card {
      background: var(--color-surface);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-2xl) var(--space-xl);
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      animation: modal-in 0.3s ease;
    }

    .login-logo {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      margin: 0 auto var(--space-lg);
      display: block;
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--color-text);
      margin-bottom: var(--space-xs);
    }

    .login-sub {
      font-size: 0.875rem;
      color: var(--color-text-muted);
      margin-bottom: var(--space-xl);
      letter-spacing: 0.04em;
    }

    .login-desc {
      font-size: 0.875rem;
      color: var(--color-text-secondary);
      margin-bottom: var(--space-xl);
      line-height: 1.6;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      width: 100%;
      padding: 14px var(--space-lg);
      background: var(--color-surface);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--color-text);
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
      box-shadow: var(--shadow-sm);
      -webkit-tap-highlight-color: transparent;
    }

    .btn-google:hover {
      background: var(--color-surface-alt);
      border-color: var(--color-primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .btn-google:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .google-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .login-error {
      margin-top: var(--space-md);
      font-size: 0.825rem;
      color: var(--color-expense);
      min-height: 20px;
    }

    .login-features {
      margin-top: var(--space-xl);
      padding-top: var(--space-lg);
      border-top: 1px solid var(--color-border-subtle);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-sm);
      text-align: left;
    }

    .login-feature {
      font-size: 0.775rem;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .login-privacy {
      margin-top: var(--space-lg);
      font-size: 0.75rem;
      color: var(--color-text-muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="login-card">

    <!-- Logo -->
    <img src="assets/icons/logo-icon.svg" alt="橘猫记账" class="login-logo">

    <h1 class="login-title">OrangeCat Budget</h1>
    <p class="login-sub">橘猫记账</p>

    <p class="login-desc">
      Sign in to sync your budget across all your devices.
      Your data is private — only you can see it.
    </p>

    <!-- Google Sign-In -->
    <button class="btn-google" id="google-signin-btn">
      <!-- Google logo SVG -->
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <p class="login-error" id="signin-error"></p>

    <!-- Feature bullets -->
    <div class="login-features">
      <div class="login-feature">📱 Sync all devices</div>
      <div class="login-feature">🔒 Private & secure</div>
      <div class="login-feature">💬 Bilingual chat</div>
      <div class="login-feature">🎯 Budget planning</div>
    </div>

    <p class="login-privacy">
      Your data is stored in your own private space on Firebase.
      No one else can see it.
    </p>

  </div>

  <script type="module">
    import { initLoginPage } from './js/auth.js';
    // Apply saved theme even on login page
    const theme = localStorage.getItem('oc_theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
    await initLoginPage();
  </script>
</body>
</html>
