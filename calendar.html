<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>橘猫记账 OrangeCat Budget — Calendar</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/calendar.css">
  <link rel="stylesheet" href="css/darkmode.css">
</head>
<body>
<div class="app-shell">

  <!-- ── Sidebar ──────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar__logo">
      <picture class="sidebar__logo-picture"><source srcset="assets/icons/logo-icon-dark.svg" media="(prefers-color-scheme: dark)"><img src="assets/icons/logo-icon.svg" alt="橘猫记账" class="sidebar__logo-img" width="40" height="40"></picture>
      <div class="sidebar__logo-text-wrap">
        <span class="sidebar__logo-text">OrangeCat</span>
        <span class="sidebar__logo-sub">橘猫记账</span>
      </div>
    </div>
    <nav class="sidebar__nav">
      <a href="index.html" class="nav-item" data-nav="dashboard"><span class="nav-item__icon">🏠</span> <span data-i18n="nav.dashboard">Dashboard</span></a>
      <a href="index.html#chat" class="nav-item" data-nav="chat"><span class="nav-item__icon">💬</span> <span data-i18n="nav.chat">Chat</span></a>
      <a href="calendar.html" class="nav-item active" data-nav="calendar"><span class="nav-item__icon">📅</span> <span data-i18n="nav.calendar">Calendar</span></a>
      <a href="index.html#transactions" class="nav-item" data-nav="transactions"><span class="nav-item__icon">📋</span> <span data-i18n="nav.transactions">Transactions</span></a>
      <a href="budget.html" class="nav-item" data-nav="budget"><span class="nav-item__icon">🎯</span> <span data-i18n="nav.budget">Budget</span></a>
      <a href="reports.html" class="nav-item" data-nav="reports"><span class="nav-item__icon">📊</span> <span data-i18n="nav.reports">Reports</span></a>
      <a href="settings.html" class="nav-item" data-nav="settings"><span class="nav-item__icon">⚙️</span> <span data-i18n="nav.settings">Settings</span></a>
    </nav>
    <div class="sidebar__bottom">
      <button id="theme-toggle"><span id="theme-icon">🌙</span></button>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────── -->
  <main class="main-content">
    <header class="topbar">
      <h1 class="topbar__title" data-i18n="calendar.title">Calendar</h1>
      <div class="topbar__actions">
        <button id="theme-toggle" class="icon-btn">🌙</button>
      </div>
    </header>

    <div class="page-content">

      <!-- Meals section -->
      <div class="section">
        <div class="section__header">
          <h2 class="section__title">🍱 Meal Tracker</h2>
          <button class="btn btn--ghost btn--sm" id="meal-section-toggle"><span data-i18n="meals.toggle">Show / Hide</span></button>
        </div>
        <div class="card" id="meal-section">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);margin-bottom:var(--space-md)">
            <label><span data-i18n="meals.labelDate">Date</span> <input type="date" id="meal-date" class="field"></label>
            <label><span data-i18n="meals.labelDesc">Description</span> <input type="text" id="meal-desc" class="field" placeholder="" data-i18n-placeholder="meals.descPlaceholder"></label>
          </div>
          <div id="meal-preview-wrap" style="margin-bottom:var(--space-md)">
            <img id="meal-preview" src="" alt="Meal preview" style="display:none;max-height:180px;border-radius:var(--radius-md);object-fit:cover">
          </div>
          <div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-bottom:var(--space-md)">
            <button class="btn btn--ghost btn--sm" id="meal-camera-btn" data-i18n="meals.camera">📷 Camera</button>
            <button class="btn btn--ghost btn--sm" id="meal-upload-btn" data-i18n="meals.upload">📁 Upload Photo</button>
            <input type="file" id="meal-file-input" accept="image/*" style="display:none">
            <button class="btn btn--primary btn--sm" id="meal-save-btn" data-i18n="meals.saveMeal">Save Meal</button>
          </div>
          <div id="meals-gallery"></div>
        </div>
      </div>

      <!-- Calendar -->
      <div class="section">
        <div class="cal-controls">
          <button class="btn btn--ghost btn--sm" id="cal-prev" data-i18n="calendar.prev">← Prev</button>
          <span id="cal-month-label" style="flex:1;text-align:center;font-weight:700">Loading...</span>
          <button class="btn btn--ghost btn--sm" id="cal-today" data-i18n="calendar.today">Today</button>
          <button class="btn btn--ghost btn--sm" id="cal-next" data-i18n="calendar.next">Next →</button>
        </div>
        <div class="cal-grid-wrapper">
          <div id="calendar-grid"></div>
        </div>
        <p class="muted" style="margin-top:var(--space-sm);font-size:0.75rem">
          💚 Green = income &nbsp; 🔴 Red = expense &nbsp; Click any date to see details
        </p>
      </div>

    </div>
  </main>

  <!-- Day detail panel -->
  <div class="day-detail" id="day-detail">
    <div class="day-detail__header">
      <h3 class="day-detail__date" id="day-detail-date">—</h3>
      <button class="icon-btn" id="day-detail-close">✕</button>
    </div>
    <div id="day-detail-body"></div>
  </div>

</div>

<!-- Camera modal -->
<div class="modal" id="camera-modal">
  <div class="modal__box">
    <div class="modal__header">
      <h3 class="modal__title" data-i18n="meals.cameraTitle">Take Meal Photo</h3>
      <button class="modal__close" id="camera-close">✕</button>
    </div>
    <video id="camera-video" style="width:100%;border-radius:var(--radius-md)" playsinline></video>
    <button class="btn btn--primary" id="camera-capture" style="width:100%;margin-top:var(--space-md)" data-i18n="meals.capture">📸 Capture</button>
  </div>
</div>

<!-- Mobile nav -->
<nav class="mobile-nav">
  <div class="mobile-nav__items">
    <a href="index.html" class="mobile-nav__item"><span class="mobile-nav__item__icon">🏠</span> <span data-i18n="nav.home">Home</span></a>
    <a href="index.html#chat" class="mobile-nav__item"><span class="mobile-nav__item__icon">💬</span> <span data-i18n="nav.chat">Chat</span></a>
    <a href="calendar.html" class="mobile-nav__item active"><span class="mobile-nav__item__icon">📅</span> <span data-i18n="nav.calendar">Calendar</span></a>
    <a href="budget.html" class="mobile-nav__item"><span class="mobile-nav__item__icon">🎯</span> <span data-i18n="nav.budget">Budget</span></a>
    <a href="reports.html" class="mobile-nav__item"><span class="mobile-nav__item__icon">📊</span> <span data-i18n="nav.reports">Reports</span></a>
    <a href="settings.html" class="mobile-nav__item"><span class="mobile-nav__item__icon">⚙️</span> <span data-i18n="nav.settings">Settings</span></a>
  </div>
</nav>

<script type="module">
import { initApp, applyToDOM } from './js/app.js';
import { initCalendar } from './js/calendar.js';
import { initMeals } from './js/meals.js';

await initApp();
document.addEventListener('langchange', async () => { applyToDOM(); await initCalendar(); });
await initCalendar();
await initMeals();

document.getElementById('meal-section-toggle')?.addEventListener('click', () => {
  const sec = document.getElementById('meal-section');
  sec.style.display = sec.style.display === 'none' ? '' : 'none';
});
</script>
</body>
</html>
